# =============================================
# Конфигурация еженедельного генератора
# =============================================

# Подключение к OLTP (PostgreSQL)
database:
  host: "oltp"
  port: 5432
  dbname: "smart_parking"
  user: "oltp"
  password: "oltp"

# Параметры генерации
generation:
  # Минимальное количество записей за неделю
  min_records: 1000
  # Диапазон дополнительных записей (итог: min_records + randint(0, records_range))
  records_range: 1000

# Проценты загрязнений (от числа сгенерированных за неделю записей)
dirt:
  # События exit без парного entrance
  orphan_exit_pct: 0.5
  # Дубли записей подряд
  duplicate_pct: 0.3
  # Отрицательная длительность парковки
  negative_duration_pct: 0.2
  # Пропуски: 1–2 часа в неделю полностью без логов
  missing_hours: 2

# Параметры нагрузки (смягчённые, унаследованные от исторического)
load_pattern:
  morning_peak: [ 7, 8, 9 ]
  evening_peak: [ 17, 18, 19 ]
  night_hours: [ 0, 1, 2, 3, 4, 5 ]
  high_demand_days: [ 4, 5 ]
  low_demand_days: [ 6 ]
  seasonal_factors:
    1: 0.75
    2: 0.80
    3: 0.90
    4: 1.00
    5: 1.10
    6: 1.05
    7: 0.95
    8: 0.90
    9: 1.10
    10: 1.15
    11: 1.05
    12: 1.20
