# =============================================
# Конфигурация генератора исторических данных
# =============================================

# Подключение к OLTP (PostgreSQL)
database:
  host: "oltp"
  port: 5432
  dbname: "smart_parking"
  user: "oltp"
  password: "oltp"

# Параметры генерации
generation:
  # Период: 3 года назад от сегодня
  years_back: 3
  # Общее количество записей за весь период
  records_count: 50000
  # Начальное заполнение парковок (процент от max_places) на старте периода
  initial_occupancy_pct: 40

# Проценты загрязнений (от общего числа записей)
dirt:
  # События exit без парного entrance (датчик глюкнул)
  orphan_exit_pct: 0.5
  # Дубли записей подряд (двойной entrance или двойной exit)
  duplicate_pct: 0.3
  # Отрицательная длительность парковки (exit раньше entrance)
  negative_duration_pct: 0.2
  # Полные пропуски данных (целые дни без логов)
  missing_days: 6

# Параметры сезонности и пиковых нагрузок
load_pattern:
  # Час пик: утренний и вечерний
  morning_peak: [ 7, 8, 9 ]
  evening_peak: [ 17, 18, 19 ]
  # Минимальная загрузка ночью
  night_hours: [ 0, 1, 2, 3, 4, 5 ]
  # Дни с повышенным спросом (пятница, суббота)
  high_demand_days: [ 4, 5 ]
  # Дни с пониженным спросом (воскресенье)
  low_demand_days: [ 6 ]
  # Сезонные коэффициенты по месяцам (1-12)
  seasonal_factors:
    1: 0.75 # январь — низкий сезон
    2: 0.80
    3: 0.90
    4: 1.00
    5: 1.10
    6: 1.05
    7: 0.95 # июль — отпуска
    8: 0.90 # август — отпуска
    9: 1.10
    10: 1.15
    11: 1.05
    12: 1.20 # декабрь — предпраздничный рост
